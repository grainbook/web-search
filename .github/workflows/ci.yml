name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Cargo component check
        run: cargo component check

      - name: Cargo component clippy
        run: cargo component clippy -- -D warnings

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Build release
        run: cargo component build --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_search_plugin.wasm
          path: target/wasm32-wasip1/release/web_search_plugin.wasm
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: web_search_plugin.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: web_search_plugin.wasm
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
